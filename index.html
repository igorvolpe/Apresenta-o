<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Vida ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;600&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #ff4d6d; --bg: #fff5f6; --text: #2b2d42; --night: #0b132b; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; } /* Cursor personalizado */
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; transition: background 1.5s ease; }

        /* Custom Cursor */
        #cursor { width: 20px; height: 20px; background: var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: multiply; transition: transform 0.1s; }

        /* Layout */
        .timeline-wrapper { display: flex; width: 500vw; height: 100vh; transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1); }
        section { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; position: relative; }

        /* Typography */
        h1 { font-family: 'Dancing Script', cursive; font-size: clamp(3rem, 10vw, 6rem); color: var(--primary); margin-bottom: 20px; }
        .typewriter { font-size: 1.2rem; min-height: 1.6em; max-width: 600px; font-weight: 300; }

        /* Music Toggle */
        #music-toggle { position: fixed; top: 20px; right: 20px; z-index: 2000; background: white; border: none; padding: 10px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; }

        /* Sections Variations */
        .section-night { background: var(--night) !important; color: white !important; }
        .section-night h1 { color: #5bc0be; }

        /* Floating Elements */
        .floating-heart { position: absolute; pointer-events: none; animation: floatUp 4s linear infinite; z-index: 1; opacity: 0.6; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100vh) scale(1.5); opacity: 0; } }

        .btn-next { margin-top: 40px; padding: 18px 45px; border-radius: 100px; border: none; background: var(--text); color: white; font-weight: 600; cursor: pointer; transition: 0.4s; z-index: 100; letter-spacing: 2px; }
        .btn-next:hover { background: var(--primary); transform: scale(1.1); box-shadow: 0 15px 30px rgba(255, 77, 109, 0.4); }

        .future-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <button id="music-toggle" onclick="toggleMusic()">🎵</button>
    <audio id="bg-music" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
    </audio>

    <div class="timeline-wrapper" id="master-container">
        
        <section>
            <h1 id="title-1">Oi, meu amor...</h1>
            <p class="typewriter" id="text-1"></p>
            <button class="btn-next" onclick="next(1)">Entrar no nosso mundo ➔</button>
        </section>

        <section style="background: #fff0f3;">
            <p style="letter-spacing: 4px; font-size: 0.7rem; color: var(--primary); margin-bottom: 20px;">NOSSA ETERNIDADE EM NÚMEROS</p>
            <div style="background: white; padding: 40px; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.03);">
                <h2 id="batimentos" style="font-size: 3.5rem; color: var(--text); font-weight: 800;">0</h2>
                <p style="opacity: 0.6;">batidas do meu coração por você.</p>
            </div>
            <button class="btn-next" onclick="next(2)">Mas por que você? ➔</button>
        </section>

        <section>
            <h1 style="font-size: 3.5rem;">Porque você é única.</h1>
            <p class="typewriter" id="text-3" style="font-style: italic; font-family: 'Playfair Display'; font-size: 1.5rem;"></p>
            <button class="btn-next" onclick="next(3)">Para onde vamos? ➔</button>
        </section>

        <section class="section-night">
            <h1>Nossos Sonhos.</h1>
            <div id="text-4" class="typewriter"></div>
            <button class="btn-next" style="background: #5bc0be;" onclick="showFuture()">Revelar Destinos ✈️</button>
            
            <div class="future-card" id="future">
                <p>📍 <strong>Agosto 2026:</strong> Abraçar sua família em <b>Itapipoca</b>.</p>
                <p style="margin: 15px 0;">🇮🇹 <strong>2028:</strong> Gelatto e pôr do sol na <b>Itália</b>.</p>
                <p style="font-family: 'Dancing Script'; font-size: 2rem; color: #5bc0be;">Tudo com você.</p>
            </div>
        </section>

        <section>
            <h1>Feliz 4 Meses.</h1>
            <p>Este é o meu "eu te amo" em forma de código.</p>
            <button class="btn-next" onclick="finalCelebrate()">Celebrar Nós Dois ❤️</button>
        </section>
    </div>

    <script>
        // Custom Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Navigation & Typewriter
        let currentStep = 0;
        const container = document.getElementById('master-container');
        
        const texts = [
            "Hoje fazemos 4 meses, e eu decidi te contar uma história...",
            "", // Section 2 doesn't use typewriter
            "Você transformou um dia comum em Gonçalves no início da melhor aventura da minha vida. Te amar é fácil, é leve, é casa.",
            "Nosso mapa está apenas começando a ser desenhado. De Itapipoca ao Coliseu, meu destino é onde você estiver."
        ];

        function typeWriter(text, elementId, speed = 50) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = "";
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function next(step) {
            currentStep = step;
            container.style.transform = `translateX(-${step * 100}vw)`;
            if (texts[step]) {
                setTimeout(() => typeWriter(texts[step], `text-${step + 1}`), 800);
            }
        }

        // Heartbeats (80bpm)
        const inicio = new Date("2025-11-22T00:00:00").getTime();
        setInterval(() => {
            const agora = new Date().getTime();
            const batidas = Math.floor(((agora - inicio) / (1000 * 60)) * 80);
            document.getElementById("batimentos").innerHTML = batidas.toLocaleString('pt-BR');
        }, 1000);

        // Hearts Animation
        setInterval(() => {
            const heart = document.createElement("div");
            heart.className = "floating-heart";
            heart.innerHTML = ["❤️", "💖", "✨", "🌸"][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.top = "100vh";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }, 300);

        // Music
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            if (music.paused) { music.play(); } else { music.pause(); }
        }

        function showFuture() {
            document.getElementById('future').style.display = 'block';
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 }, colors: ['#5bc0be', '#ffffff'] });
        }

        function finalCelebrate() {
            confetti({ particleCount: 400, spread: 150, origin: { y: 0.5 } });
        }

        // Init first typewriter
        window.onload = () => typeWriter(texts[0], "text-1");
    </script>
</body>
</html>
