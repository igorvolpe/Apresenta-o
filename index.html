<script>
    // 1. EFEITO CHUVA DE CORAÇÕES
    function criarCoracao() {
        const coracao = document.createElement("div");
        coracao.innerHTML = "❤️";
        coracao.style.position = "fixed";
        coracao.style.left = Math.random() * 100 + "vw";
        coracao.style.top = "100vh";
        coracao.style.fontSize = Math.random() * 20 + 10 + "px";
        coracao.style.opacity = Math.random();
        coracao.style.transition = "transform 5s linear, opacity 5s";
        
        document.body.appendChild(coracao);

        setTimeout(() => {
            coracao.style.transform = `translateY(-110vh) rotate(${Math.random() * 360}deg)`;
            coracao.style.opacity = "0";
        }, 100);

        setTimeout(() => { coracao.remove(); }, 6000);
    }
    setInterval(criarCoracao, 300); // Cria um coração a cada 300ms

    // 2. CONTADOR DE TEMPO (Início: 22 de Novembro de 2025)
    const dataInicio = new Date("2025-11-22T00:00:00").getTime();

    setInterval(() => {
        const agora = new Date().getTime();
        const diferenca = agora - dataInicio;

        const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
        const horas = Math.floor((diferenca % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutos = Math.floor((diferenca % (1000 * 60 * 60)) / (1000 * 60));
        const segundos = Math.floor((diferenca % (1000 * 60)) / 1000);

        // Se você criar um elemento com id="contador", ele vai atualizar aqui:
        // document.getElementById("contador").innerHTML = `${dias} dias, ${horas}h ${minutos}m ${segundos}s`;
    }, 1000);
</script>
