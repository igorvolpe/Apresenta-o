<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos 4 Meses ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&family=Playfair+Display:italic&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-principal: #e63946;
            --cor-fundo: #fdf0f0;
            --cor-texto: #1d3557;
            --cor-noite: #0b132b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Efeito de Corações Caindo */
        .coracao-caindo {
            position: fixed;
            top: -10%;
            z-index: 9999;
            user-select: none;
            animation: queda linear forwards;
        }

        @keyframes queda {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin: 50px auto;
            text-align: center;
            z-index: 2;
        }

        header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: var(--cor-principal);
            margin-bottom: 5px;
        }

        #contador {
            font-size: 1.1rem;
            background: white;
            padding: 12px 25px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            color: var(--cor-principal);
            font-weight: 600;
        }

        .carta {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            line-height: 1.8;
            text-align: left;
        }

        .carta h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            text-align: center;
            color: var(--cor-principal);
            margin-top: 0;
        }

        .poesia {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #457b9d;
            border-left: 4px solid #ffb3c1;
            padding-left: 20px;
            margin: 30px 0;
        }

        /* ESTILO MAPA ESTELAR */
        .mapa-estelar {
            background: var(--cor-noite);
            color: #ffffff;
            padding: 40px 20px;
            border-radius: 20px;
            margin-top: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .estrelas-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 20px);
            background-size: 50px 50px;
            opacity: 0.2;
        }

        .coordenadas {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #5bc0be;
            margin-bottom: 15px;
            display: block;
        }
